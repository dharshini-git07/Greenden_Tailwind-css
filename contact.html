<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenden</title>
    <link href="./src/output.css" rel="stylesheet">
</head>

<body>
    <!-- Responsive Navbar -->
    <nav class="bg-green-100 p-3 flex items-center justify-between shadow-xl sticky top-0 z-10">
        <h1 class="text-2xl font-medium">GREENDEN</h1>

        <details class="md:hidden">
            <summary class="list-none cursor-pointer text-xl">☰</summary>

            <div class="mt-2 flex flex-col">
                <ul>
                    <li class="p-1">
                        <a href="index.html" class="py-2">Home</a>
                    </li>

                    <li class="p-1">
                        <a href="product.html" class="py-2">Products</a>
                    </li>

                    <li class="p-1">
                        <a href="contact.html" class="py-2">Contact</a>
                    </li>
                </ul>
            </div>
        </details>

         <ul class="flex gap-5 text-gray-600 hidden md:flex">
            <li>
                <a class="hover:underline hover:text-black cursor-pointer" href="index.html">Home</a>
            </li>

            <li>
                <a class="hover:underline hover:text-black cursor-pointer" href="product.html">Products</a>
            </li>

            <li>
                <a class="hover:underline hover:text-black cursor-pointer" href="contact.html">Contact</a>
            </li>
        </ul>

    </nav>

    <!-- Contact Form -->
    <div class="bg-green-100 ">
        <!-- Top Section -->
        <div class="bg-green-100 h-32"></div>

        <!-- Contact Form -->
        <div class="max-w-5xl mx-auto px-4 sm:px-5 lg:px-8 pb-4">
            <div class="bg-green-950 w-full shadow rounded-lg p-4 sm:p-5 md:p-6 -mt-10 sm:-mt-20 md:-mt-28">

                <p class="text-2xl sm:text-3xl md:text-4xl font-bold text-center text-white py-2 mb-4">
                    Contact me
                </p>
                <form action="" method="post">

                    <!-- Name & Phone -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

                        <div class="flex flex-col">
                            <label class="font-semibold text-gray-300 mb-2">Name</label>
                            <input type="text" class="p-3 rounded bg-white focus:outline-none w-full">
                        </div>

                        <div class="flex flex-col">
                            <label class="font-semibold text-gray-300 mb-2">Phone</label>
                            <input type="tel" class="p-3 rounded bg-white focus:outline-none w-full">
                        </div>

                    </div>

                    <!-- Subject -->
                    <div class="mt-3">
                        <label class="font-semibold text-gray-300 mb-2 block">Subject</label>
                        <input type="text" class="w-full p-3 rounded bg-white focus:outline-none">
                    </div>

                    <!-- Message -->
                    <div class="mt-3">
                        <label class="font-semibold text-gray-300 mb-2 block">Message</label>
                        <textarea rows="4" class="w-full  px-3 rounded bg-white resize-y focus:outline-none"
                            placeholder="Write your message..."></textarea>
                    </div>

                    <!-- Button -->
                    <div class="flex justify-center mt-5">
                        <button
                            class="bg-green-200 text-black font-semibold py-3 px-8 rounded hover:bg-green-500 transition duration-300">
                            Send message
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <section class="bg-green-200 p-3 flex flex-col gap-9">
        <h1 class="font-bold text-3xl mt-5">Greenden</h1>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Quod culpa modi debitis amet. Quaerat, accusantium?
        </p>
        <p>&copy; Greenden.com</p>
    </section>

</body>

</html>
